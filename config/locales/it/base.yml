    - ott
    - nov
    - dic
    day_names:
    - domenica
    - lunedì
    - martedì
    - mercoledì
    - giovedì
    - venerdì
    - sabato
    formats:
      default: "%d/%m/%Y"
      long: "%A %e %B %Y"
      short: "%d %b"
      month: "%B"
      label: "%e %B %Y"
      month_short: "%b."
      month_year_short: "%b. %y"
      month_year: "%B %Y"
      day_month_short: "%e %b."
      day_month: "%A %e %B"
    month_names:
    -
