name: fleetyards-dev
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - 8271:5432
    volumes:
      - postgres:/var/lib/postgresql/data
  redis:
    image: redis:7.2.5-alpine
    ports:
      - 8272:6379
    volumes:
      - redis:/data
volumes:
  postgres:
  redis:
networks:
  default:
    name: fleetyards-network
