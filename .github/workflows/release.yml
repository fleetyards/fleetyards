name: Release

on:
  release:
    types: [published]

jobs:
  build:
    uses: ./.github/workflows/build.job.yml
    with:
      tag: ${{ github.event.release.tag_name }}
    permissions:
      contents: read
      packages: write
    secrets: inherit

  deploy-to-live:
    needs: [build]
    uses: ./.github/workflows/deploy.job.yml
    with:
      destination: live
      name: Live
      url: https://fleetyards.net
    secrets: inherit

  notify-appsignal:
    needs: [deploy-to-live]
    uses: ./.github/workflows/notify-appsignal.job.yml
    with:
      environment: Live
    secrets: inherit

  notify-discord:
    runs-on: ubuntu-latest
    needs: [deploy-to-live]
    environment: Live
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      TAG_NAME: ${{ github.event.release.tag_name }}
      RELEASE_URL: ${{ github.event.release.html_url }}
      RELEASE_BODY: ${{ github.event.release.body }}
    steps:
      - run: |
          BODY=$(echo "$RELEASE_BODY" | head -c 1500)

          curl -sSf -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg title "Fleetyards ${TAG_NAME} released!" \
              --arg url "$RELEASE_URL" \
              --arg description "$BODY" \
              '{
                embeds: [{
                  title: $title,
                  url: $url,
                  description: $description,
                  color: 3066993
                }]
              }'
            )"

  move-done-to-deployed:
    runs-on: ubuntu-latest
    needs: [deploy-to-live]
    steps:
      - name: Move Done items to Deployed
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          PROJECT_ID: "PVT_kwDOAGoNC84AAZg-"
          STATUS_FIELD_ID: "PVTSSF_lADOAGoNC84AAZg-zgANg84"
          DONE_OPTION_ID: "98236657"
          DEPLOYED_OPTION_ID: "ebe234ea"
        run: |
          ITEMS=$(gh api graphql --paginate -f query='
            query($cursor: String) {
              node(id: "'"$PROJECT_ID"'") {
                ... on ProjectV2 {
                  items(first: 100, after: $cursor) {
                    pageInfo { hasNextPage endCursor }
                    nodes {
                      id
                      fieldValueByName(name: "Status") {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          optionId
                        }
                      }
                    }
                  }
                }
              }
            }' --jq '.data.node.items.nodes[] | select(.fieldValueByName.optionId == "'"$DONE_OPTION_ID"'") | .id')

          for ITEM_ID in $ITEMS; do
            gh api graphql -f query='
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: "'"$PROJECT_ID"'"
                  itemId: "'"$ITEM_ID"'"
                  fieldId: "'"$STATUS_FIELD_ID"'"
                  value: { singleSelectOptionId: "'"$DEPLOYED_OPTION_ID"'" }
                }) {
                  projectV2Item { id }
                }
              }'
            echo "Moved $ITEM_ID to Deployed"
          done
