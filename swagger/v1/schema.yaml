components:
  parameters:
    PageParameter:
      name: page
      in: query
      schema:
        type: string
        default: '1'
      required: false
    SortingParameter:
      name: s
      in: query
      schema:
        type: array
        items:
          type: string
      description: Sorting
      required: false
  schemas:
    BarChartStats:
      type: object
      properties:
        label:
          type: string
        count:
          type: integer
        tooltip:
          type: string
      additionalProperties: false
      required:
      - label
      - count
      - tooltip
      title: BarChartStats
    BaseList:
      type: object
      properties:
        meta:
          "$ref": "#/components/schemas/Meta"
      additionalProperties: false
      required:
      - meta
      title: BaseList
    BoughtViaEnum:
      type: string
      enum:
      - pledge_store
      - ingame
      x-enumNames:
      - PLEDGE_STORE
      - INGAME
      title: BoughtViaEnum
    CargoHold:
      type: object
      properties:
        name:
          type: string
        dimensions:
          "$ref": "#/components/schemas/CargoHoldDimension"
        capacity:
          type: integer
        maxContainerSize:
          "$ref": "#/components/schemas/CargoHoldContainerSize"
        limits:
          type: object
          properties:
            min:
              "$ref": "#/components/schemas/CargoHoldLimit"
            max:
              "$ref": "#/components/schemas/CargoHoldLimit"
          additionalProperties: false
          required:
          - min
        offset:
          type: object
          nullable: true
          properties:
            x:
              type: number
            "y":
              type: number
            z:
              type: number
          additionalProperties: false
          required:
          - x
          - "y"
          - z
        rotation:
          type: integer
          nullable: true
      additionalProperties: false
      required:
      - dimensions
      - capacity
      - maxContainerSize
      - limits
      title: CargoHold
    CargoHoldContainerSize:
      type: object
      properties:
        size:
          type: integer
        dimensions:
          "$ref": "#/components/schemas/CargoHoldDimension"
      additionalProperties: false
      required:
      - size
      - dimensions
      title: CargoHoldContainerSize
    CargoHoldDimension:
      type: object
      properties:
        x:
          type: number
        "y":
          type: number
        z:
          type: number
      additionalProperties: false
      required:
      - x
      - "y"
      - z
      title: CargoHoldDimension
    CargoHoldLimit:
      type: object
      properties:
        dimensions:
          "$ref": "#/components/schemas/CargoHoldDimension"
        capacity:
          type: integer
      additionalProperties: false
      required:
      - dimensions
      - capacity
      title: CargoHoldLimit
    ChannelsEnum:
      type: string
      enum:
