name: Ruby Tests Job

on:
  workflow_call:

jobs:
  ruby-tests:
    runs-on: ubuntu-latest

    env:
      RAILS_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: root
      DB_PASSWORD: root
      REDIS_URL: redis://localhost:6379

    services:
      postgres:
        image: postgres:13.2-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_DB: fleetyards_test
          POSTGRES_PASSWORD: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:6.2.10-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        ci_node_total: [2]
        ci_node_index: [0, 1]

    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
      - name: Install pnpm
        run: npm install -g pnpm@9.1.3
      - uses: actions/cache@v3
        with:
          path: |
            "**/node_modules"
            "~/.pnpm-store"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/pnpm-lock.yaml') }}
      - run: pnpm install
      - name: Build email assets
        run: bin/build-email-assets
      - run: mkdir -p log
      - name: Prepare test databases
        run: bundle exec flatware fan -w 2 rake db:create db:schema:load
      - name: Run tests
        env:
          CI_NODE_TOTAL: ${{ matrix.ci_node_total }}
          CI_NODE_INDEX: ${{ matrix.ci_node_index }}
        run: |
          specs=($(find spec -name '*_spec.rb' | sort))
          total=${#specs[@]}
          node_specs=()
          for ((i=0; i<total; i++)); do
            if (( i % CI_NODE_TOTAL == CI_NODE_INDEX )); then
              node_specs+=("${specs[$i]}")
            fi
          done
          bundle exec flatware rspec -w 2 "${node_specs[@]}"
