name: Promote Release

on:
  workflow_dispatch:
    inputs:
      codename:
        description: "Release codename (leave empty to keep current)"
        required: false
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Find RC and calculate final version
        id: version
        run: |
          # Find the latest RC tag
          LATEST_RC=$(git tag -l "v*-rc.*" | sort -V | tail -1)
          if [ -z "$LATEST_RC" ]; then
            echo "::error::No pre-release (RC) tags found"
            exit 1
          fi

          echo "rc_tag=${LATEST_RC}" >> "$GITHUB_OUTPUT"

          # Strip -rc.N to get the base version
          BASE_TAG=$(echo "$LATEST_RC" | sed 's/-rc\.[0-9]*//')
          BASE_VERSION="${BASE_TAG#v}"

          # Verify this version doesn't already exist as a full release
          if git rev-parse "${BASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${BASE_TAG} already exists as a full release"
            exit 1
          fi

          echo "tag=${BASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"

          # Find the last full release tag (non-RC) for changelog range
          LAST_FULL_TAG=$(git tag -l "v[0-9]*" --sort=-version:refname | grep -v '\-rc\.' | head -1 || echo "")
          echo "previous_tag=${LAST_FULL_TAG}" >> "$GITHUB_OUTPUT"

          # Get current codename
          CURRENT_CODENAME=$(grep 'CODENAME' config/version.rb | sed 's/.*"\(.*\)".*/\1/')
          CODENAME="${{ inputs.codename }}"
          if [ -z "$CODENAME" ]; then
            CODENAME="$CURRENT_CODENAME"
          fi
          echo "codename=${CODENAME}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG="${{ steps.version.outputs.previous_tag }}"
          NEW_TAG="${{ steps.version.outputs.tag }}"

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "body=Initial release" >> "$GITHUB_OUTPUT"
          else
            BODY=$(bash .github/scripts/generate-changelog.sh "$PREVIOUS_TAG" "$NEW_TAG")
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "body<<$EOF" >> "$GITHUB_OUTPUT"
            echo "$BODY" >> "$GITHUB_OUTPUT"
            echo "$EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Update CHANGELOG.md
        run: |
          PREVIOUS_TAG="${{ steps.version.outputs.previous_tag }}"
          NEW_TAG="${{ steps.version.outputs.tag }}"

          if [ -n "$PREVIOUS_TAG" ]; then
            ENTRY=$(bash .github/scripts/generate-changelog.sh "$PREVIOUS_TAG" "$NEW_TAG")
            # Remove the Image section from CHANGELOG.md entry
            ENTRY=$(echo "$ENTRY" | sed '/^### Image$/,/^$/d' | sed '/^ghcr.io/d')

            {
              head -3 CHANGELOG.md
              echo ""
              echo "$ENTRY"
              tail -n +4 CHANGELOG.md
            } > CHANGELOG.md.tmp
            mv CHANGELOG.md.tmp CHANGELOG.md
          fi

      - name: Update config/version.rb
        run: |
          NEW_TAG="${{ steps.version.outputs.tag }}"
          CODENAME="${{ steps.version.outputs.codename }}"

          sed -i "s/VERSION = \"v[^\"]*\"/VERSION = \"${NEW_TAG}\"/" config/version.rb
          sed -i "s/CODENAME = \"[^\"]*\"/CODENAME = \"${CODENAME}\"/" config/version.rb

      - name: Update package.json
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          jq ".version = \"${NEW_VERSION}\"" package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Commit and tag
        run: |
          NEW_TAG="${{ steps.version.outputs.tag }}"
          CODENAME="${{ steps.version.outputs.codename }}"

          git add config/version.rb package.json CHANGELOG.md
          git commit -m "chore(release): ${NEW_TAG} (${CODENAME})"
          git tag "${NEW_TAG}" -m "Release ${NEW_TAG} (${CODENAME})"

      - name: Push changes
        run: |
          git push origin main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="${{ steps.version.outputs.tag }}"

          gh release create "${NEW_TAG}" \
            --title "${NEW_TAG}" \
            --notes "${{ steps.changelog.outputs.body }}"
