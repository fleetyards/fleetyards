          welcome: 欢迎 %{username}
        subject: 确认说明
      email_changed:
        content:
          text_confirmed: 我们联系您是为了通知您邮箱已更改为 %{email}。
          text_unconfirmed: 我们联系您是为了通知您邮箱正在更改为 %{email}。
