name: Build Job

on:
  workflow_call:
    inputs:
      tag:
        description: "Docker image tag"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Install 1Password CLI
        run: |
          curl -sSfo /tmp/op.zip "https://cache.agilebits.com/dist/1P/op2/pkg/v2.33.0/op_linux_amd64_v2.33.0.zip"
          unzip -o /tmp/op.zip -d /usr/local/bin op
          chmod +x /usr/local/bin/op

      - name: Fetch Rails master key
        id: secrets
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          RAILS_MASTER_KEY=$(op read "op://Fleetyards/RAILS_MASTER_KEY_LIVE/credential")
          echo "::add-mask::$RAILS_MASTER_KEY"
          echo "rails_master_key=$RAILS_MASTER_KEY" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/fleetyards/app
          tags: |
            type=raw,value=${{ inputs.tag }}
            type=raw,value=${{ github.sha }}

      - name: Read Ruby version from .tool-versions
        id: ruby
        run: echo "version=$(grep '^ruby ' .tool-versions | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            service=fleetyards
          build-args: |
            RUBY_VERSION=${{ steps.ruby.outputs.version }}
            GIT_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            RAILS_MASTER_KEY=${{ steps.secrets.outputs.rails_master_key }}
