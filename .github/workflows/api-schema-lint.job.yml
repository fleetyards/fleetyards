name: Api Schema Lint Job

on:
  workflow_call:

jobs:
  api-schema-lint:
    name: API Schema Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/js-setup-action
      - run: pnpm run validate-schema
      - run: pnpm run validate-admin-schema
