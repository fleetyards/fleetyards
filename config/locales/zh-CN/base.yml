    - 星期日
    - 星期一
    - 星期二
    - 星期三
    - 星期四
    - 星期五
    - 星期六
    formats:
      default: "%Y-%m-%d"
      long: "%Y年%m月%d日 %A"
      short: "%m月%d日"
      month: "%B"
      label: "%Y年%m月%d日"
      month_short: "%m月"
      month_year_short: "%y年%m月"
      month_year: "%Y年%m月"
      day_month_short: "%m月%d日"
      day_month: "%m月%d日 %A"
    month_names:
    -
    - 一月
    - 二月
    - 三月
    - 四月
    - 五月
    - 六月
    - 七月
    - 八月
    - 九月
    - 十月
    - 十一月
    - 十二月
    order:
    - :year
    - :month
    - :day
  datetime:
    distance_in_words:
      about_x_hours:
        one: 大约 1 小时
        other: "大约 %{count} 小时"
      about_x_months:
        one: 大约 1 个月
        other: "大约 %{count} 个月"
      about_x_years:
        one: 大约 1 年
        other: "大约 %{count} 年"
      almost_x_years:
        one: 接近 1 年
        other: "接近 %{count} 年"
      half_a_minute: 半分钟
      less_than_x_minutes:
        one: 不到 1 分钟
        other: "不到 %{count} 分钟"
      less_than_x_seconds:
        one: 不到 1 秒
        other: "不到 %{count} 秒"
      over_x_years:
        one: 超过 1 年
        other: "超过 %{count} 年"
      x_days:
        one: 1 天
        other: "%{count} 天"
      x_minutes:
        one: 1 分钟
        other: "%{count} 分钟"
      x_months:
        one: 1 个月
        other: "%{count} 个月"
      x_seconds:
        one: 1 秒
        other: "%{count} 秒"
    prompts:
      day: 日
      hour: 时
      minute: 分
      month: 月
      second: 秒
      year: 年
  errors: &errors
    format: "%{attribute} %{message}"
    messages:
      accepted: 必须接受
      blank: 不能为空
      present: 必须为空
      confirmation: "与 %{attribute} 不匹配"
      empty: 不能为空
      equal_to: "必须等于 %{count}"
      even: 必须是偶数
      exclusion: 已被保留
      greater_than: "必须大于 %{count}"
      greater_than_or_equal_to: "必须大于或等于 %{count}"
      inclusion: 不在列表中
      invalid: 无效
      less_than: "必须小于 %{count}"
      less_than_or_equal_to: "必须小于或等于 %{count}"
      not_a_number: 不是数字
      not_an_integer: 必须是整数
      odd: 必须是奇数
      record_invalid: "验证失败：%{errors}"
      restrict_dependent_destroy:
        one: "无法删除记录，因为存在依赖的 %{record}"
        many: "无法删除记录，因为存在依赖的 %{record}"
      taken: 已被使用
      too_long:
        one: 太长（最多 1 个字符）
        other: "太长（最多 %{count} 个字符）"
      too_short:
        one: 太短（最少 1 个字符）
        other: "太短（最少 %{count} 个字符）"
      wrong_length:
        one: 长度错误（应为 1 个字符）
        other: "长度错误（应为 %{count} 个字符）"
      other_than: "必须不等于 %{count}"
    template:
      body: "以下字段存在问题："
      header:
        one: "无法保存 %{model}：1 个错误"
        other: "无法保存 %{model}：%{count} 个错误"
  helpers:
    select:
      prompt: 请选择
    submit:
      create: "创建 %{model}"
      submit: "保存 %{model}"
      update: "更新 %{model}"
  distance:
    centi: cm
    unit: m
    thousand: km
  weight:
    centi: kg
    unit: t
    thousand: mt
  people:
    unit:
      one: 人
      other: 人
  number:
    currency:
      format:
        delimiter: ","
        format: "%u%n"
        precision: 2
        separator: "."
        significant: false
        strip_insignificant_zeros: false
        unit: $
    format:
      delimiter: ","
      precision: 3
      separator: "."
      significant: false
      strip_insignificant_zeros: false
    human:
      decimal_units:
        format: "%n %u"
        units:
          billion: 十亿
          million: 百万
          quadrillion: 千万亿
          thousand: 千
          trillion: 万亿
          unit: ""
      format:
        delimiter: ""
        precision: 3
        significant: true
        strip_insignificant_zeros: true
      storage_units:
        format: "%n %u"
        units:
          byte:
            one: 字节
            other: 字节
          gb: GB
          kb: KB
          mb: MB
          tb: TB
    percentage:
      format:
        delimiter: ""
        format: "%n%"
    precision:
      format:
        delimiter: ""
  support:
    array:
      last_word_connector: "和"
      two_words_connector: "和"
      words_connector: "、"
  time:
    am: 上午
    formats:
      default: "%Y年%m月%d日 %A %H:%M:%S %z"
      label: "%Y年%m月%d日 %H:%M %Z"
      long: "%Y年%m月%d日 %H:%M"
      short: "%m月%d日 %H:%M"
    pm: 下午
  activemodel:
    errors:
      <<: *errors
  activerecord:
    errors:
      <<: *errors
