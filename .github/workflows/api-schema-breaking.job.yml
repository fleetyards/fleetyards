name: Api Schema Breaking Changes Job

on:
  workflow_call:

jobs:
  api-schema-breaking:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install oasdiff
        run: |
          curl -fsSL https://raw.githubusercontent.com/Tufin/oasdiff/main/install.sh | sh

      - name: Get base branch schemas
        run: |
          if [ "${{ github.event_name }}" = "merge_group" ]; then
            BASE_SHA="${{ github.event.merge_group.base_sha }}"
          elif [ -n "$GITHUB_BASE_REF" ]; then
            BASE_SHA="origin/${GITHUB_BASE_REF}"
          else
            BASE_SHA="HEAD~1"
          fi
          for schema in swagger/v1/schema.yaml swagger/admin/v1/schema.yaml swagger/oauth/v1/schema.yaml; do
            mkdir -p ".base/$(dirname "$schema")"
            git show "${BASE_SHA}:${schema}" > ".base/${schema}" 2>/dev/null || echo '{"openapi":"3.0.0","info":{"title":"empty","version":"0.0.0"},"paths":{}}' > ".base/${schema}"
          done

      - name: Ensure ignore files exist
        run: |
          for f in swagger/v1/oasdiff-ignore.txt swagger/admin/v1/oasdiff-ignore.txt swagger/oauth/v1/oasdiff-ignore.txt; do
            [ -f "$f" ] || touch "$f"
          done

      - name: Check public API breaking changes
        run: oasdiff breaking .base/swagger/v1/schema.yaml swagger/v1/schema.yaml --fail-on WARN --err-ignore swagger/v1/oasdiff-ignore.txt --warn-ignore swagger/v1/oasdiff-ignore.txt

      - name: Check OAuth API breaking changes
        run: oasdiff breaking .base/swagger/oauth/v1/schema.yaml swagger/oauth/v1/schema.yaml --fail-on WARN --err-ignore swagger/oauth/v1/oasdiff-ignore.txt --warn-ignore swagger/oauth/v1/oasdiff-ignore.txt

      - name: Check admin API breaking changes (warn only)
        run: oasdiff breaking .base/swagger/admin/v1/schema.yaml swagger/admin/v1/schema.yaml --fail-on ERR --err-ignore swagger/admin/v1/oasdiff-ignore.txt
