name: Api Schema Breaking Changes Job

on:
  workflow_call:

jobs:
  api-schema-breaking:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get base branch schemas
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            BASE_REF="HEAD~1"
          elif [ "${{ github.event_name }}" = "merge_group" ]; then
            BASE_REF="${{ github.event.merge_group.base_sha }}"
          else
            BASE_REF="origin/${{ github.base_ref }}"
          fi
          git show ${BASE_REF}:swagger/v1/schema.yaml > /tmp/base-schema.yaml
          git show ${BASE_REF}:swagger/admin/v1/schema.yaml > /tmp/base-admin-schema.yaml

      - name: Install oasdiff
        run: |
          curl -fsSL https://raw.githubusercontent.com/Tufin/oasdiff/main/install.sh | sh

      - name: Check breaking changes (API)
        run: |
          echo "### API Breaking Changes" >> $GITHUB_STEP_SUMMARY
          output=$(oasdiff breaking /tmp/base-schema.yaml swagger/v1/schema.yaml 2>&1) || true
          if [ -n "$output" ]; then
            echo "::warning::Breaking changes detected in API schema"
            echo "$output"
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$output" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No breaking changes detected."
            echo "No breaking changes detected." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check breaking changes (Admin API)
        run: |
          echo "### Admin API Breaking Changes" >> $GITHUB_STEP_SUMMARY
          output=$(oasdiff breaking /tmp/base-admin-schema.yaml swagger/admin/v1/schema.yaml 2>&1) || true
          if [ -n "$output" ]; then
            echo "::warning::Breaking changes detected in Admin API schema"
            echo "$output"
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$output" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No breaking changes detected."
            echo "No breaking changes detected." >> $GITHUB_STEP_SUMMARY
          fi
