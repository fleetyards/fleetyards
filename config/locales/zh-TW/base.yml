      body: "以下欄位存在問題："
      header:
        one: "無法儲存 %{model}：1 個錯誤"
        other: "無法儲存 %{model}：%{count} 個錯誤"
  helpers:
    select:
      prompt: 請選擇
    submit:
      create: "建立 %{model}"
      submit: "儲存 %{model}"
      update: "更新 %{model}"
  distance:
    centi: cm
    unit: m
    thousand: km
  weight:
    centi: kg
    unit: t
    thousand: mt
  people:
    unit:
      one: 人
      other: 人
  number:
    currency:
      format:
        delimiter: ","
        format: "%u%n"
        precision: 2
        separator: "."
        significant: false
        strip_insignificant_zeros: false
        unit: $
    format:
      delimiter: ","
      precision: 3
      separator: "."
      significant: false
      strip_insignificant_zeros: false
    human:
      decimal_units:
        format: "%n %u"
        units:
          billion: 十億
          million: 百萬
          quadrillion: 千萬億
          thousand: 千
          trillion: 萬億
          unit: ""
      format:
        delimiter: ""
        precision: 3
        significant: true
        strip_insignificant_zeros: true
      storage_units:
        format: "%n %u"
        units:
          byte:
            one: 位元組
            other: 位元組
          gb: GB
          kb: KB
          mb: MB
          tb: TB
    percentage:
      format:
        delimiter: ""
        format: "%n%"
    precision:
      format:
        delimiter: ""
  support:
    array:
      last_word_connector: "和"
      two_words_connector: "和"
      words_connector: "、"
  time:
    am: 上午
    formats:
      default: "%Y年%m月%d日 %A %H:%M:%S %z"
      label: "%Y年%m月%d日 %H:%M %Z"
      long: "%Y年%m月%d日 %H:%M"
      short: "%m月%d日 %H:%M"
    pm: 下午
  activemodel:
    errors:
      <<: *errors
  activerecord:
    errors:
      <<: *errors
