        one: 1 minuto
        other: "%{count} minutos"
      x_months:
        one: 1 mes
        other: "%{count} meses"
      x_seconds:
        one: 1 segundo
        other: "%{count} segundos"
    prompts:
      day: Día
      hour: Hora
      minute: Minuto
      month: Mes
      second: Segundos
      year: Año
  errors: &errors
    format: "%{attribute} %{message}"
    messages:
      accepted: debe ser aceptado
      blank: no puede estar en blanco
      present: debe estar en blanco
      confirmation: "no coincide con %{attribute}"
      empty: no puede estar vacío
      equal_to: "debe ser igual a %{count}"
      even: debe ser par
      exclusion: está reservado
      greater_than: "debe ser mayor que %{count}"
      greater_than_or_equal_to: "debe ser mayor o igual que %{count}"
      inclusion: no está incluido en la lista
      invalid: no es válido
      less_than: "debe ser menor que %{count}"
      less_than_or_equal_to: "debe ser menor o igual que %{count}"
      not_a_number: no es un número
      not_an_integer: debe ser un entero
      odd: debe ser impar
      record_invalid: "La validación falló: %{errors}"
      restrict_dependent_destroy:
        one: "No se puede eliminar el registro porque existe un %{record} dependiente"
        many: "No se puede eliminar el registro porque existen %{record} dependientes"
      taken: ya ha sido tomado
      too_long:
        one: es demasiado largo (máximo 1 carácter)
        other: "es demasiado largo (máximo %{count} caracteres)"
      too_short:
        one: es demasiado corto (mínimo 1 carácter)
        other: "es demasiado corto (mínimo %{count} caracteres)"
      wrong_length:
        one: tiene la longitud incorrecta (debe ser 1 carácter)
        other: "tiene la longitud incorrecta (debe ser %{count} caracteres)"
      other_than: "debe ser diferente de %{count}"
    template:
      body: "Se encontraron problemas con los siguientes campos:"
      header:
        one: "No se pudo guardar %{model}: 1 error"
        other: "No se pudo guardar %{model}: %{count} errores"
  helpers:
    select:
      prompt: Por favor seleccione
    submit:
      create: "Crear %{model}"
      submit: "Guardar %{model}"
      update: "Actualizar %{model}"
  distance:
    centi: cm
    unit: m
    thousand: km
  weight:
    centi: kg
    unit: t
    thousand: mt
  people:
    unit:
      one: persona
      other: personas
  number:
    currency:
      format:
        delimiter: "."
        format: "%n %u"
        precision: 2
        separator: ","
        significant: false
        strip_insignificant_zeros: false
        unit: $
    format:
      delimiter: "."
      precision: 3
      separator: ","
      significant: false
      strip_insignificant_zeros: false
    human:
      decimal_units:
        format: "%n %u"
        units:
          billion: Billón
          million: Millón
          quadrillion: Cuatrillón
          thousand: Mil
          trillion: Trillón
          unit: ""
      format:
        delimiter: ""
        precision: 3
        significant: true
        strip_insignificant_zeros: true
      storage_units:
        format: "%n %u"
        units:
          byte:
            one: Byte
            other: Bytes
          gb: GB
          kb: KB
          mb: MB
          tb: TB
    percentage:
      format:
        delimiter: ""
        format: "%n%"
    precision:
      format:
        delimiter: ""
  support:
    array:
      last_word_connector: " y "
      two_words_connector: " y "
      words_connector: ", "
  time:
    am: am
    formats:
      default: "%a, %d %b %Y %H:%M:%S %z"
      label: "%e de %B de %Y a las %H:%M %Z"
      long: "%d de %B de %Y %H:%M"
      short: "%d %b %H:%M"
    pm: pm
  activemodel:
    errors:
      <<: *errors
  activerecord:
    errors:
      <<: *errors
