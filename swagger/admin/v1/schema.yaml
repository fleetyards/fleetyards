components:
  schemas:
    AdminCargoHold:
      type: object
      properties:
        id:
          type: string
          format: uuid
        parentType:
          type: string
        parentId:
          type: string
          format: uuid
        name:
          type: string
          nullable: true
        position:
          type: integer
          nullable: true
        capacityScu:
          type: number
        dimensionX:
          type: number
        dimensionY:
          type: number
        dimensionZ:
          type: number
        offsetX:
          type: number
          nullable: true
        offsetY:
          type: number
          nullable: true
        offsetZ:
          type: number
          nullable: true
        rotation:
          type: integer
          nullable: true
        parent:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            slug:
              type: string
              nullable: true
          required:
          - id
          - name
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      additionalProperties: false
      required:
      - id
      - parentType
      - parentId
      - capacityScu
      - dimensionX
      - dimensionY
      - dimensionZ
      - createdAt
      - updatedAt
      title: AdminCargoHold
    AdminCargoHolds:
      type: object
      properties:
        meta:
          "$ref": "#/components/schemas/Meta"
        items:
          type: array
          items:
            "$ref": "#/components/schemas/AdminCargoHold"
      additionalProperties: false
      required:
