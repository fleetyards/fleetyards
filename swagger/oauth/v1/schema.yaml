---
openapi: 3.0.3
info:
  title: FleetYards.net OAuth API
  version: v1
  license:
    name: GNU General Public License v3.0
    url: https://github.com/fleetyards/fleetyards/blob/main/LICENSE
paths:
  "/authorize":
    get:
      summary: Pre-authorize OAuth application
      tags:
      - OAuth
      operationId: oauthPreAuthorize
      parameters:
      - name: client_id
        in: query
        schema:
          type: string
        required: true
      - name: redirect_uri
        in: query
        schema:
          type: string
        required: true
      - name: response_type
        in: query
        schema:
          type: string
        required: true
      - name: scope
        in: query
        schema:
          type: string
        required: true
      - name: state
        in: query
        schema:
          type: string
        required: false
      - name: code_challenge
        in: query
        schema:
          type: string
        required: false
      - name: code_challenge_method
        in: query
        schema:
          type: string
        required: false
      security:
      - SessionCookie: []
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/OauthPreAuthorization"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/StandardError"
        '400':
          "$ref": "#/components/responses/SchemaValidationError"
    post:
      summary: Authorize OAuth application
      tags:
      - OAuth
      operationId: oauthAuthorize
      security:
      - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/OauthAuthorizationInput"
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/OauthAuthorizationRedirect"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/StandardError"
        '400':
          "$ref": "#/components/responses/SchemaValidationError"
    delete:
      summary: Deny OAuth authorization
      tags:
      - OAuth
      operationId: oauthDeny
      security:
      - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/OauthAuthorizationInput"
      responses:
        '400':
          description: denied
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/OauthAuthorizationRedirect"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/StandardError"
servers:
- url: http://fleetyards.test/oauth
  description: Dev Server
- url: https://fleetyards.net/oauth
  description: Production Server
- url: https://fleetyards.dev/oauth
  description: Staging Server
components:
  schemas:
    OauthAuthorizationInput:
      type: object
      properties:
        clientId:
          type: string
        redirectUri:
          type: string
        responseType:
          type: string
        responseMode:
          type: string
          nullable: true
        scope:
          type: string
        state:
          type: string
          nullable: true
        codeChallenge:
          type: string
          nullable: true
        codeChallengeMethod:
          type: string
          nullable: true
      additionalProperties: false
      required:
      - clientId
      - redirectUri
      - responseType
      - scope
      title: OauthAuthorizationInput
    OauthAuthorizationRedirect:
      type: object
      properties:
        status:
          type: string
          enum:
          - redirect
          - post
        redirect_uri:
          type: string
      additionalProperties: false
      required:
      - status
      - redirect_uri
      title: OauthAuthorizationRedirect
    OauthPreAuthorization:
      type: object
      properties:
        clientId:
          type: string
        clientName:
          type: string
        redirectUri:
          type: string
        state:
          type: string
          nullable: true
        responseType:
          type: string
        responseMode:
          type: string
          nullable: true
        scope:
          type: string
        codeChallenge:
          type: string
          nullable: true
        codeChallengeMethod:
          type: string
          nullable: true
        scopes:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
            required:
            - name
            - description
      additionalProperties: false
      required:
      - clientId
      - clientName
      - redirectUri
      - responseType
      - scope
      - scopes
      title: OauthPreAuthorization
    StandardError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      additionalProperties: false
      required:
      - code
      - message
      title: StandardError
  securitySchemes:
    SessionCookie:
      type: apiKey
      description: Session Cookie
      name: FLTYRD
      in: cookie
  responses:
    SchemaValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              details:
                type: array
                items:
                  type: string
            required:
            - error
            - details
security: []
