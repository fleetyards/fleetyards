name: CDN Upload Job

on:
  workflow_call:
    inputs:
      tag:
        description: "Docker image tag to extract assets from"
        required: true
        type: string
      destination:
        description: "Deployment destination (live, stage)"
        required: true
        type: string

jobs:
  upload:
    runs-on: ubuntu-latest

    permissions:
      packages: read

    steps:
      - name: Install 1Password CLI
        run: |
          curl -sSfo /tmp/op.zip "https://cache.agilebits.com/dist/1P/op2/pkg/v2.33.0/op_linux_amd64_v2.33.0.zip"
          unzip -o /tmp/op.zip -d /usr/local/bin op
          chmod +x /usr/local/bin/op

      - name: Fetch Bunny Storage credentials
        id: secrets
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          DESTINATION: ${{ inputs.destination }}
        run: |
          DEST_UPPER=$(echo "$DESTINATION" | tr '[:lower:]' '[:upper:]')

          PASSWORD=$(op read "op://Fleetyards/BUNNY_STORAGE_${DEST_UPPER}/password")
          echo "::add-mask::$PASSWORD"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

          ZONE_NAME=$(op read "op://Fleetyards/BUNNY_STORAGE_${DEST_UPPER}/config/zone_name")
          echo "zone_name=$ZONE_NAME" >> "$GITHUB_OUTPUT"

          ENDPOINT=$(op read "op://Fleetyards/BUNNY_STORAGE_${DEST_UPPER}/config/endpoint")
          echo "endpoint=$ENDPOINT" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract assets from Docker image
        run: |
          docker pull ghcr.io/fleetyards/app:${{ inputs.tag }}
          CID=$(docker create ghcr.io/fleetyards/app:${{ inputs.tag }})
          docker cp "${CID}:/rails/public/vite" ./vite-assets
          docker rm "${CID}"
          echo "Extracted $(find ./vite-assets -type f | wc -l) asset files"

      - name: Upload assets to Bunny Storage
        env:
          BUNNY_STORAGE_PASSWORD: ${{ steps.secrets.outputs.password }}
          BUNNY_STORAGE_ZONE: ${{ steps.secrets.outputs.zone_name }}
          BUNNY_STORAGE_ENDPOINT: ${{ steps.secrets.outputs.endpoint }}
        run: |
          STORAGE_URL="${BUNNY_STORAGE_ENDPOINT}/${BUNNY_STORAGE_ZONE}"
          export BUNNY_STORAGE_PASSWORD STORAGE_URL

          cd vite-assets

          TOTAL=$(find . -type f | wc -l)
          echo "Uploading ${TOTAL} files to Bunny Storage..."

          cat > /tmp/upload.sh << 'EOF'
          #!/bin/bash
          rel="${1#./}"
          curl -sSf -X PUT \
            -H "AccessKey: ${BUNNY_STORAGE_PASSWORD}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@${1}" \
            "${STORAGE_URL}/vite/${rel}" > /dev/null
          EOF
          chmod +x /tmp/upload.sh

          find . -type f -print0 | xargs -0 -P 20 -n 1 /tmp/upload.sh

          echo "Upload complete."
