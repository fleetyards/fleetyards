      messages:
        backup_codes: 备用码已生成。
        disable:
          failure: 请输入有效的令牌。
          success: 两步验证已禁用。
        enable:
          failure: 请输入有效的令牌。
          success: 两步验证已启用。
      otp_enabled: 两步验证已启用?
