production:
  push_api_key: "<%= Rails.application.credentials.dig(:appsignal, :push_api_key) rescue nil %>"
  name: "Fleetyards"
  active: true
  working_directory_path: "/tmp/appsignal"
  enable_logging: true
  ignore_errors:
      - ActiveRecord::RecordNotFound
      - ActionController::RoutingError
      - ActionController::InvalidAuthenticityToken

staging:
  push_api_key: "<%= Rails.application.credentials.dig(:appsignal, :push_api_key) rescue nil %>"
  name: "fleetyards"
  active: true
  working_directory_path: "/tmp/appsignal"
  enable_logging: true
  log_level: "debug"
  ignore_errors:
      - ActiveRecord::RecordNotFound
      - ActionController::RoutingError
      - ActionController::InvalidAuthenticityToken

development:
  active: false
