name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      prerelease:
        description: "Create a pre-release (RC) for staging"
        required: true
        type: boolean
        default: false
      codename:
        description: "Release codename (leave empty to keep current)"
        required: false
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate next version
        id: version
        run: |
          CURRENT=$(jq -r .version package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT%%-*}"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          BASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          if [ "${{ inputs.prerelease }}" = "true" ]; then
            LAST_RC=$(git tag -l "v${BASE_VERSION}-rc.*" | sort -V | tail -1 | grep -oP 'rc\.\K\d+' || echo "0")
            RC_NUM=$((LAST_RC + 1))
            NEW_VERSION="${BASE_VERSION}-rc.${RC_NUM}"
          else
            NEW_VERSION="${BASE_VERSION}"
          fi

          NEW_TAG="v${NEW_VERSION}"

          # Get current codename
          CURRENT_CODENAME=$(grep 'CODENAME' config/version.rb | sed 's/.*"\(.*\)".*/\1/')
          CODENAME="${{ inputs.codename }}"
          if [ -z "$CODENAME" ]; then
            CODENAME="$CURRENT_CODENAME"
          fi

          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "codename=${CODENAME}" >> "$GITHUB_OUTPUT"

          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG="${{ steps.version.outputs.previous_tag }}"
          NEW_TAG="${{ steps.version.outputs.tag }}"

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "body=Initial release" >> "$GITHUB_OUTPUT"
          else
            BODY=$(bash .github/scripts/generate-changelog.sh "$PREVIOUS_TAG" "$NEW_TAG")
            # Use a delimiter for multiline output
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "body<<$EOF" >> "$GITHUB_OUTPUT"
            echo "$BODY" >> "$GITHUB_OUTPUT"
            echo "$EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Update CHANGELOG.md
        if: inputs.prerelease == false
        run: |
          PREVIOUS_TAG="${{ steps.version.outputs.previous_tag }}"
          NEW_TAG="${{ steps.version.outputs.tag }}"

          if [ -n "$PREVIOUS_TAG" ]; then
            ENTRY=$(bash .github/scripts/generate-changelog.sh "$PREVIOUS_TAG" "$NEW_TAG")
            # Remove the Image section from CHANGELOG.md entry
            ENTRY=$(echo "$ENTRY" | sed '/^### Image$/,/^$/d' | sed '/^ghcr.io/d')

            # Prepend entry after the first line (# Changelog header)
            {
              head -3 CHANGELOG.md
              echo ""
              echo "$ENTRY"
              tail -n +4 CHANGELOG.md
            } > CHANGELOG.md.tmp
            mv CHANGELOG.md.tmp CHANGELOG.md
          fi

      - name: Update config/version.rb
        run: |
          NEW_TAG="${{ steps.version.outputs.tag }}"
          CODENAME="${{ steps.version.outputs.codename }}"

          sed -i "s/VERSION = \"v[^\"]*\"/VERSION = \"${NEW_TAG}\"/" config/version.rb
          sed -i "s/CODENAME = \"[^\"]*\"/CODENAME = \"${CODENAME}\"/" config/version.rb

      - name: Update package.json
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          jq ".version = \"${NEW_VERSION}\"" package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Commit and tag
        run: |
          NEW_TAG="${{ steps.version.outputs.tag }}"
          CODENAME="${{ steps.version.outputs.codename }}"

          git add config/version.rb package.json
          if [ "${{ inputs.prerelease }}" = "false" ]; then
            git add CHANGELOG.md
          fi

          git commit -m "chore(release): ${NEW_TAG} (${CODENAME})"
          git tag "${NEW_TAG}" -m "Release ${NEW_TAG} (${CODENAME})"

      - name: Push changes
        run: |
          git push origin main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="${{ steps.version.outputs.tag }}"
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${NEW_TAG}" \
            --title "${NEW_TAG}" \
            --notes "${{ steps.changelog.outputs.body }}" \
            ${PRERELEASE_FLAG}
