name: Release

on:
  release:
    types: [published]

jobs:
  build:
    uses: ./.github/workflows/build.job.yml
    with:
      tag: ${{ github.event.release.tag_name }}
    permissions:
      contents: read
      packages: write
    secrets: inherit

  cdn-upload:
    needs: [build]
    uses: ./.github/workflows/cdn-upload.job.yml
    with:
      tag: ${{ github.event.release.tag_name }}
      destination: live
      cleanup: true
    secrets: inherit

  deploy-to-live:
    needs: [cdn-upload]
    uses: ./.github/workflows/deploy.job.yml
    with:
      destination: live
      name: Live
      url: https://fleetyards.net
    secrets: inherit

  notify-appsignal:
    needs: [deploy-to-live]
    uses: ./.github/workflows/notify-appsignal.job.yml
    with:
      environment: Live
    secrets: inherit

  notify-discord:
    runs-on: ubuntu-latest
    needs: [deploy-to-live]
    environment: Live
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      TAG_NAME: ${{ github.event.release.tag_name }}
      RELEASE_URL: ${{ github.event.release.html_url }}
      RELEASE_BODY: ${{ github.event.release.body }}
    steps:
      - run: |
          jq -n \
            --arg title "Fleetyards ${TAG_NAME} released!" \
            --arg url "$RELEASE_URL" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: (env.RELEASE_BODY | .[:1500]),
                color: 3066993
              }]
            }' > /tmp/discord_payload.json

          curl -sSf -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d @/tmp/discord_payload.json

  move-done-to-deployed:
    needs: [deploy-to-live]
    uses: ./.github/workflows/move-done-to-deployed.job.yml
    secrets: inherit
