      minute: 分
      month: 月
      second: 秒
      year: 年
  errors: &errors
    format: "%{attribute} %{message}"
    messages:
      accepted: 必須接受
      blank: 不能為空
      present: 必須為空
      confirmation: "與 %{attribute} 不符"
      empty: 不能為空
      equal_to: "必須等於 %{count}"
