shared:
  name: <%= ENV["APP_NAME"] || 'Fleetyards.net' %>
  copyright_owner: <%= ENV["COPYRIGHT_OWNER"] || 'Torlek Maru' %>

  api_version: <%= ENV["API_VERSION"] || 'v1' %>
  admin_api_version: <%= ENV["ADMIN_API_VERSION"] || 'v1' %>
  store_version: <%= ENV["APP_STORE_VERSION"] || 11.0 %>
  embed_store_version: <%= ENV["APP_EMBED_STORE_VERSION"] || 2.0 %>

  domain: <%= ENV["DOMAIN"] || "localhost:#{ENV["PORT"] || 3000}" %>
  short_domain: <%= ENV["SHORT_DOMAIN"] %>
  cookie_domain: <%= ENV["COOKIE_DOMAIN"] || :all %>
  cookie_prefix: <%= ENV["COOKIE_PREFIX"] || 'FLTYRD' %>

  on_subdomain?: <%= ENV["ON_SUBDOMAIN"] || false %>

  cable_endpoint: <%= ENV["CABLE_ENDPOINT"] || "ws://localhost:#{ENV["PORT"]}/cable" %>
  cable_channel_prefix: <%= ENV["CABLE_CHANNEL_PREFIX"] %>

  mailer_default_from: <%= ENV["MAILER_DEFAULT_FROM"] %>
  mailer_default_admin_to: <%= ENV["MAILER_DEFAULT_ADMIN_TO"] %>

  cdn_endpoint: <%= ENV["CDN_ENDPOINT"] || "cdn.fltyrd.net" %>

  s3_seeds_fleetchart_bucket: <%= ENV["S3_SEEDS_FLEETCHART_BUCKET"] || "seeds_fleetchart" %>

  opensearch_url: <%= ENV["OPENSEARCH_URL"] || 'localhost:9200' %>

  sc_data:
    version: "4.6.0-live.11218823"
    environment: "live"

  discord:
    oauth_client_id: <%= Rails.application.credentials.dig(:discord, :oauth_client_id) rescue nil %>
    oauth_secret: <%= Rails.application.credentials.dig(:discord, :oauth_secret) rescue nil %>

  github:
    oauth_client_id: <%= Rails.application.credentials.dig(:github, :oauth_client_id) rescue nil %>
    oauth_secret: <%= Rails.application.credentials.dig(:github, :oauth_secret) rescue nil %>

  twitch:
    oauth_client_id: <%= Rails.application.credentials.dig(:twitch, :oauth_client_id) rescue nil %>
    oauth_secret: <%= Rails.application.credentials.dig(:twitch, :oauth_secret) rescue nil %>

  google:
    oauth_client_id: <%= Rails.application.credentials.dig(:google, :oauth_client_id) rescue nil %>
    oauth_secret: <%= Rails.application.credentials.dig(:google, :oauth_secret) rescue nil %>

  apple:
    bundle_id: <%= Rails.application.credentials.dig(:apple, :bundle_id) rescue nil %>
    id_prefix: <%= Rails.application.credentials.dig(:apple, :id_prefix) rescue nil %>
    key: <%= Rails.application.credentials.dig(:apple, :key_id) rescue nil %>
    pem: <%= Rails.application.credentials.dig(:apple, :pem) rescue nil %>

staging:
  on_subdomain?: true

production:
  on_subdomain?: true

  cdn_endpoint: <%= ENV["CDN_ENDPOINT"] || "https://cdn.fltyrd.net" %>
  legacy_cdn_endpoint: <%= ENV["LEGACY_CDN_ENDPOINT"] || "https://cdn.fleetyards.net" %>

review:
  domain: <%= ENV["HEROKU_APP_NAME"] %>.herokuapp.com
  elasticsearch_url: <%= ENV["BONSAI_URL"] %>
