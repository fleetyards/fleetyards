name: Deploy Job

on:
  workflow_call:
    inputs:
      destination:
        required: true
        type: string
      name:
        required: true
        type: string
      url:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: ${{ inputs.name }}
      url: ${{ inputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          known_hosts: unnecessary
          if_key_exists: ignore

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install hcloud CLI
        run: |
          curl -fsSL -o /tmp/hcloud.tar.gz https://github.com/hetznercloud/cli/releases/latest/download/hcloud-linux-amd64.tar.gz
          tar -xzf /tmp/hcloud.tar.gz -C /usr/local/bin hcloud

      - name: Fetch known hosts
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          WEB_IPS=$(bash .kamal/server-ips web ${{ inputs.destination }})
          ACC_IPS=$(bash .kamal/server-ips accessory ${{ inputs.destination }})
          ALL_IPS=$(echo "$WEB_IPS,$ACC_IPS" | tr ',' ' ')
          ssh-keyscan $ALL_IPS >> ~/.ssh/known_hosts

      - name: Deploy with Kamal
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          KAMAL_REGISTRY_USERNAME: ${{ github.repository_owner }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
        run: bundle exec kamal deploy -d ${{ inputs.destination }} --skip-push
