name: Main

on:
  push:
    branches: ["main", "staging", "trying"]
    tags-ignore:
      - "*.*"
    paths-ignore:
      - "CHANGELOG.md"
      - "config/version.rb"
      - "package.json"
  pull_request:
  merge_group:
  workflow_dispatch:

jobs:
  js-setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/workflows/js-setup-action

  ruby-setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

  js-lint:
    needs: js-setup
    uses: ./.github/workflows/jobs/js-lint.job.yml

  tsc:
    needs: [ruby-setup, js-setup]
    uses: ./.github/workflows/jobs/tsc.job.yml

  js-prettier:
    needs: js-setup
    uses: ./.github/workflows/jobs/js-prettier.job.yml

  api-schema-lint:
    name: API Schema Lint
    needs: js-setup
    uses: ./.github/workflows/jobs/api-schema-lint.job.yml

  js-tests:
    needs: js-setup
    uses: ./.github/workflows/jobs/js-tests.job.yml

  ruby-lint:
    needs: ruby-setup
    uses: ./.github/workflows/jobs/ruby-lint.job.yml

  ruby-tests:
    needs: ruby-setup
    uses: ./.github/workflows/jobs/ruby-tests.job.yml

  seeds:
    needs: ruby-setup
    uses: ./.github/workflows/jobs/seeds.job.yml

  build:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/jobs/build.job.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
    permissions:
      contents: read
      packages: write

  api-schema-breaking:
    name: API Schema Breaking Changes
    uses: ./.github/workflows/jobs/api-schema-breaking.job.yml

  api-schema-check:
    name: API Schema Check
    needs: [ruby-setup, js-setup]
    uses: ./.github/workflows/jobs/api-schema-check.job.yml

  e2e-test:
    needs: [ruby-setup, js-setup]
    uses: ./.github/workflows/jobs/e2e.job.yml
    secrets: inherit
